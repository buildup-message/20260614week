        const appContainer = document.getElementById('app-container');

        // 메인 홈 화면 렌더링
        function renderHome() {
            let daysHtml = '';
            devotionalData.forEach((data, index) => {
                daysHtml += `
                    <div onclick="openDay(${index})" class="bg-white border border-stone-200 rounded-xl p-4 flex items-center justify-between cursor-pointer hover:border-emerald-500 hover:shadow-md transition-all group">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-full bg-[#fbf9f6] flex items-center justify-center text-stone-600 font-bold group-hover:bg-emerald-100 group-hover:text-emerald-700 transition-colors">
                                ${data.day[0]}
                            </div>
                            <div>
                                <h3 class="text-stone-800 font-bold text-lg">${data.shortTitle}</h3>
                                <p class="text-stone-500 text-sm mt-0.5">${data.passage}</p>
                            </div>
                        </div>
                        <i class="fas fa-chevron-right text-stone-300 group-hover:text-emerald-500 transition-colors"></i>
                    </div>
                `;
            });

            appContainer.innerHTML = `
                <!-- Header -->
                <header class="gradient-wood text-white p-8 text-center relative overflow-hidden fade-in">
                    <div class="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('https://www.transparenttextures.com/patterns/stardust.png')]"></div>
                    <div class="relative z-10">
                        <span class="inline-block py-1 px-3 rounded-full bg-white/20 text-xs font-semibold mb-4 tracking-widest text-amber-50">
                            WEEKLY DEVOTIONAL
                        </span>
                        <h1 class="text-2xl sm:text-3xl font-bold leading-snug mb-3 break-keep">
                            무너진 삶의 질서를<br>다시 세우는 6일의 여정
                        </h1>
                        <p class="text-amber-100/80 text-sm break-keep">
                            지난 주일 "질서가 세워질 때, 채워지기 시작합니다" 설교의 은혜를 에베소서 말씀으로 구체화하는 주간 묵상입니다.
                        </p>
                    </div>
                </header>

                <div class="p-6 sm:p-8 space-y-8 fade-in" style="animation-delay: 0.1s;">
                    
                    <!-- 묵상 가이드 -->
                    <section class="bg-emerald-50 rounded-2xl p-6 border border-emerald-100">
                        <h2 class="text-emerald-900 font-bold mb-4 flex items-center gap-2">
                            <i class="fas fa-seedling text-emerald-600"></i> 이렇게 묵상해 보세요
                        </h2>
                        <ul class="space-y-3 text-sm text-emerald-800 break-keep">
                            <li class="flex gap-3"><span class="font-bold text-emerald-600">1. 준비</span> 조용한 장소에서 기도로 마음의 혼돈을 가라앉힙니다.</li>
                            <li class="flex gap-3"><span class="font-bold text-emerald-600">2. 읽기</span> 오늘 주신 말씀을 천천히 3번 반복해서 읽습니다.</li>
                            <li class="flex gap-3"><span class="font-bold text-emerald-600">3. 묵상</span> 해설과 질문을 읽으며 내 삶의 뼈대를 점검합니다.</li>
                            <li class="flex gap-3"><span class="font-bold text-emerald-600">4. 결단</span> 결단 항목을 실천하고 짧은 기도로 하루를 엽니다(또는 닫습니다).</li>
                        </ul>
                    </section>

                    <!-- 요일별 리스트 -->
                    <section>
                        <h2 class="text-lg font-bold text-stone-800 mb-4 px-1">요일별 묵상 들어가기</h2>
                        <div class="space-y-3">
                            ${daysHtml}
                        </div>
                    </section>

                </div>
            `;
            window.scrollTo(0, 0);
        }

        // 특정 요일 묵상 화면 렌더링
        function renderDay(index) {
            const data = devotionalData[index];
            const isLastDay = index === devotionalData.length - 1;

            appContainer.innerHTML = `
                <!-- 상단 네비게이션바 -->
                <div class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-stone-200 px-4 py-4 flex items-center justify-between fade-in">
                    <button onclick="goHome()" class="text-stone-500 hover:text-stone-800 w-10 h-10 flex items-center justify-center rounded-full hover:bg-stone-100 transition-colors">
                        <i class="fas fa-arrow-left text-lg"></i>
                    </button>
                    <span class="font-bold text-stone-800">${data.day} 묵상</span>
                    <div class="w-10"></div> <!-- 레이아웃 밸런스용 -->
                </div>

                <div class="p-6 sm:p-8 pb-24 space-y-8 fade-in">
                    
                    <!-- 제목 & 본문 -->
                    <header class="text-center pb-6 border-b border-stone-200">
                        <span class="text-emerald-600 font-bold tracking-wider text-sm mb-2 block">${data.passage}</span>
                        <h1 class="text-2xl font-bold text-stone-800 leading-snug break-keep">${data.title}</h1>
                    </header>

                    <!-- 성경 구절 -->
                    <section class="bg-[#fbf9f6] rounded-2xl p-6 border-l-4 border-emerald-500 shadow-sm relative">
                        <i class="fas fa-quote-left text-3xl text-emerald-500/10 absolute top-4 left-4"></i>
                        <p class="text-stone-700 leading-relaxed font-serif break-keep text-lg text-center px-4 relative z-10">
                            "${data.verses}"
                        </p>
                    </section>

                    <!-- 배경 및 해석 (SOAP: Observation) -->
                    <section class="space-y-5">
                        <div>
                            <h2 class="text-sm font-bold text-stone-400 uppercase tracking-wider mb-2"><i class="fas fa-book-open mr-2"></i>말씀의 배경</h2>
                            <p class="text-stone-600 leading-relaxed break-keep bg-white p-4 rounded-xl border border-stone-100 shadow-sm">${data.background}</p>
                        </div>
                        <div>
                            <h2 class="text-sm font-bold text-emerald-600 uppercase tracking-wider mb-2"><i class="fas fa-lightbulb mr-2"></i>말씀 산책 (해석)</h2>
                            <p class="text-stone-700 leading-relaxed break-keep bg-emerald-50/50 p-5 rounded-xl border border-emerald-100 text-[15px]">${data.interpretation}</p>
                        </div>
                    </section>

                    <!-- 깊은 묵상 질문 (Lectio Divina) -->
                    <section class="bg-stone-800 text-stone-100 rounded-2xl p-6 shadow-md">
                        <h2 class="text-amber-400 font-bold mb-4 flex items-center gap-2">
                            <i class="fas fa-droplet text-amber-400"></i> 영혼을 비추는 질문
                        </h2>
                        <ul class="space-y-4">
                            ${data.questions.map((q, i) => `
                                <li class="flex gap-3">
                                    <span class="text-stone-400 font-bold">Q${i+1}.</span>
                                    <span class="break-keep leading-relaxed text-stone-200">${q}</span>
                                </li>
                            `).join('')}
                        </ul>
                    </section>

                    <!-- 적용 및 기도 (SOAP: Application & Prayer) -->
                    <section class="space-y-4">
                        <div class="flex items-start gap-4 p-5 rounded-xl border border-stone-200 bg-white">
                            <div class="mt-0.5 bg-stone-100 text-stone-500 w-8 h-8 rounded-full flex items-center justify-center shrink-0"><i class="fas fa-check"></i></div>
                            <div>
                                <h3 class="font-bold text-stone-800 text-sm mb-1">오늘의 결단</h3>
                                <p class="text-stone-600 text-sm break-keep leading-relaxed">${data.resolution}</p>
                            </div>
                        </div>
                        <div class="flex items-start gap-4 p-5 rounded-xl border border-amber-200 bg-amber-50">
                            <div class="mt-0.5 bg-amber-200 text-amber-700 w-8 h-8 rounded-full flex items-center justify-center shrink-0"><i class="fas fa-hands-praying"></i></div>
                            <div>
                                <h3 class="font-bold text-amber-900 text-sm mb-1">이렇게 기도합니다</h3>
                                <p class="text-amber-800 text-sm break-keep leading-relaxed italic">"${data.prayer}"</p>
                            </div>
                        </div>
                    </section>

                    <!-- 네비게이션 버튼 -->
                    <div class="pt-8 border-t border-stone-200 flex ${index > 0 ? 'justify-between' : 'justify-end'}">
                        ${index > 0 ? `
                            <button onclick="openDay(${index - 1})" class="text-stone-500 hover:text-stone-800 flex items-center gap-2 px-4 py-2 rounded-lg hover:bg-stone-50 transition-colors">
                                <i class="fas fa-chevron-left text-sm"></i> 이전
                            </button>
                        ` : ''}
                        
                        ${!isLastDay ? `
                            <button onclick="openDay(${index + 1})" class="bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-6 py-2.5 rounded-xl flex items-center gap-2 shadow-md transition-all active:scale-95">
                                다음 날 <i class="fas fa-chevron-right text-sm"></i>
                            </button>
                        ` : `
                            <button onclick="goHome()" class="bg-stone-800 hover:bg-stone-900 text-white font-bold px-6 py-2.5 rounded-xl flex items-center gap-2 shadow-md transition-all active:scale-95">
                                한 주 묵상 완료 <i class="fas fa-check text-sm"></i>
                            </button>
                        `}
                    </div>
                </div>
            `;
            window.scrollTo(0, 0);
        }

        // 이벤트 핸들러
        function goHome() {
            renderHome();
        }

        function openDay(index) {
            currentDayIndex = index;
            renderDay(index);
        }

        // 앱 초기화
        document.addEventListener('DOMContentLoaded', () => {
            renderHome();
        });
    </script>
</body>
</html>
